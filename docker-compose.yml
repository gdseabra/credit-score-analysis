x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PYTHONPATH: /opt/airflow
    CREDIT_DB_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    MLFLOW_TRACKING_URI: http://mlflow:5000
    _PIP_ADDITIONAL_REQUIREMENTS: "scikit-learn==1.5.1 pyarrow==15.0.2 mlflow==2.14.3 lightgbm==4.3.0 xgboost==2.0.3 joblib==1.4.2"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models       # compartilhado com o serviço api
    - /data_lids/home/gabrielseabra/credit-score-analysis/.docker/airflow-logs:/opt/airflow/logs
    - /data_lids/home/gabrielseabra/credit-score-analysis/.docker/tmp:/tmp
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - credit-net

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - /data_lids/home/gabrielseabra/credit-score-analysis/.docker/postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - credit-net

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - >-
        airflow db migrate &&
        airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    command: >
      bash -c "pip install psycopg2-binary --quiet &&
      mlflow server
      --backend-store-uri postgresql+psycopg2://airflow:airflow@postgres/mlflow
      --default-artifact-root mlflow-artifacts:/
      --serve-artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./.docker/mlflow:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credit-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models         # pipeline treinado pelo Airflow
      - ./src:/app/src               # hot-reload em desenvolvimento
    environment:
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - credit-net

networks:
  credit-net:
    driver: bridge
